<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px
    ), repeating-linear-gradient(
      90deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px
    );
    font-family: 'Share Tech Mono', monospace;
  }

  .calc-wrapper {
    position: relative;
  }

  .label {
    font-family: 'Bebas Neue', cursive;
    color: #ff3c00;
    font-size: 11px;
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .calculator {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    padding: 20px;
    width: 300px;
    box-shadow: 0 0 0 1px #ff3c0022, 0 30px 80px rgba(0,0,0,0.8), inset 0 1px 0 #333;
    animation: slideIn 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .display {
    background: #000;
    border: 1px solid #222;
    border-radius: 2px;
    padding: 12px 16px;
    margin-bottom: 16px;
    text-align: right;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .display::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #ff3c00aa, transparent);
  }

  .expression {
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
    min-height: 16px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .current {
    font-size: 36px;
    color: #fff;
    letter-spacing: -1px;
    line-height: 1;
    text-shadow: 0 0 20px rgba(255,60,0,0.3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: all 0.1s;
  }

  .current.flash {
    color: #ff3c00;
    text-shadow: 0 0 30px rgba(255,60,0,0.8);
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    padding: 14px 0;
    cursor: pointer;
    transition: all 0.1s;
    position: relative;
    overflow: hidden;
    letter-spacing: 1px;
  }

  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.15s;
  }

  button:active::after { opacity: 0.05; }

  button:active { transform: scale(0.96); }

  /* Number buttons */
  .btn-num {
    background: #1a1a1a;
    color: #ddd;
    border-color: #2a2a2a;
  }
  .btn-num:hover { background: #222; border-color: #3a3a3a; color: #fff; }

  /* Operator buttons */
  .btn-op {
    background: #1e1200;
    color: #ff3c00;
    border-color: #3a1a00;
  }
  .btn-op:hover { background: #2a1800; border-color: #ff3c0055; box-shadow: 0 0 10px rgba(255,60,0,0.1); }

  /* Clear / special */
  .btn-clear {
    background: #1a0000;
    color: #ff3c00;
    border-color: #3a0000;
  }
  .btn-clear:hover { background: #220000; border-color: #ff3c0088; }

  /* Equals */
  .btn-eq {
    background: #ff3c00;
    color: #000;
    border-color: #ff3c00;
    font-size: 20px;
  }
  .btn-eq:hover { background: #ff5a22; box-shadow: 0 0 20px rgba(255,60,0,0.4); }

  .btn-zero { grid-column: span 2; }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 28px;
    background: #ff3c00;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>

<div class="calc-wrapper">
  <div class="label">// CALCULATOR v1.0</div>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="current" id="current">0<span class="cursor"></span></div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-clear" onclick="toggleSign()">+/-</button>
      <button class="btn-clear" onclick="percent()">%</button>
      <button class="btn-op"    onclick="setOp('/')">÷</button>

      <button class="btn-num" onclick="appendNum('7')">7</button>
      <button class="btn-num" onclick="appendNum('8')">8</button>
      <button class="btn-num" onclick="appendNum('9')">9</button>
      <button class="btn-op"  onclick="setOp('*')">×</button>

      <button class="btn-num" onclick="appendNum('4')">4</button>
      <button class="btn-num" onclick="appendNum('5')">5</button>
      <button class="btn-num" onclick="appendNum('6')">6</button>
      <button class="btn-op"  onclick="setOp('-')">−</button>

      <button class="btn-num" onclick="appendNum('1')">1</button>
      <button class="btn-num" onclick="appendNum('2')">2</button>
      <button class="btn-num" onclick="appendNum('3')">3</button>
      <button class="btn-op"  onclick="setOp('+')">+</button>

      <button class="btn-num btn-zero" onclick="appendNum('0')">0</button>
      <button class="btn-num" onclick="appendDot()">.</button>
      <button class="btn-eq" onclick="calculate()">=</button>
    </div>
  </div>
</div>

<script>
  let current = '0';
  let expression = '';
  let operator = null;
  let prevValue = null;
  let justCalc = false;

  const currentEl = document.getElementById('current');
  const expressionEl = document.getElementById('expression');

  function updateDisplay() {
    const cursor = '<span class="cursor"></span>';
    currentEl.innerHTML = current + cursor;
    expressionEl.textContent = expression;
  }

  function flash() {
    currentEl.classList.add('flash');
    setTimeout(() => currentEl.classList.remove('flash'), 150);
  }

  function appendNum(n) {
    if (justCalc) { current = n; expression = ''; justCalc = false; }
    else current = current === '0' ? n : current + n;
    if (current.length > 12) current = current.slice(0, 12);
    updateDisplay();
  }

  function appendDot() {
    if (justCalc) { current = '0.'; justCalc = false; }
    else if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function setOp(op) {
    if (operator && !justCalc) calculate(true);
    prevValue = parseFloat(current);
    operator = op;
    const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    expression = prevValue + ' ' + opSymbols[op];
    justCalc = false;
    current = '0';
    updateDisplay();
  }

  function calculate(silent = false) {
    if (operator === null || prevValue === null) return;
    const curr = parseFloat(current);
    const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    let result;
    if (operator === '+') result = prevValue + curr;
    else if (operator === '-') result = prevValue - curr;
    else if (operator === '*') result = prevValue * curr;
    else if (operator === '/') {
      if (curr === 0) { current = 'ERR'; expression = ''; operator = null; prevValue = null; updateDisplay(); return; }
      result = prevValue / curr;
    }
    if (!silent) {
      expression = prevValue + ' ' + opSymbols[operator] + ' ' + curr + ' =';
      flash();
    }
    result = parseFloat(result.toPrecision(10));
    current = String(result);
    if (current.length > 12) current = parseFloat(result.toFixed(6)).toString();
    if (!silent) { operator = null; prevValue = null; justCalc = true; }
    updateDisplay();
  }

  function clearAll() {
    current = '0'; expression = ''; operator = null; prevValue = null; justCalc = false;
    updateDisplay();
  }

  function toggleSign() {
    if (current !== '0') current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent() {
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') appendNum(e.key);
    else if (e.key === '.') appendDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('-');
    else if (e.key === '*') setOp('*');
    else if (e.key === '/') { e.preventDefault(); setOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      if (current.length > 1) current = current.slice(0,-1);
      else current = '0';
      updateDisplay();
    }
  });

  updateDisplay();
</script>
</body>
</html>
